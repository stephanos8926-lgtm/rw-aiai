---
# infra VM vars
caddyfile: |
  # RapidWebs Caddy configuration — infra VM

  ast.rapidwebs.org {
    reverse_proxy dev:8300
  }

  api.rapidwebs.org {
    reverse_proxy localhost:8080
  }

  # Hermes gateway WebSocket endpoint
  # (usually accessed via Tailscale direct, not public)
  gateway.rapidwebs.org {
    reverse_proxy localhost:9700
  }
